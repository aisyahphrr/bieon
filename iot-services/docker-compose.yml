services:
  mosquitto:
    image: eclipse-mosquitto
    container_name: bieon-mqtt-broker
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - bieon-network

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt
    container_name: bieon-zigbee2mqtt
    restart: always
    privileged: true
    user: "0:"
    volumes:
      - ./zigbee2mqtt/configuration.yaml:/app/data/configuration.yaml
      - ./zigbee2mqtt/data:/app/data
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Jakarta
    devices:
      - "/dev/ttyACM0:/dev/ttyACM0"
    networks:
      - bieon-network
    depends_on:
      - mosquitto

networks:
  bieon-network:
    driver: bridge
