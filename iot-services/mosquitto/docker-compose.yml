version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto
    container_name: bieon-mqtt-broker
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data:/mosquitto/data
      - ./log:/mosquitto/log
    networks:
      - bieon-network

networks:
  bieon-network:
    driver: bridge
